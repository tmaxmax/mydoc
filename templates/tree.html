<li>
  $if(it.Title)$
  <figure>
    <figcaption data-folder="$it.Folder$"><a href="$it.Href$">$it.Title$</a></figcaption>
    <p>$it.Description$</p>
  </figure>
  $elseif(it.Children)$
  <details>
    <summary>$it.Name$</summary>
    <ul>
      ${it.Children:tree()}
    </ul>
  </details>
  $else$
  <a href="$it.Href$">$it.Name$</a>
  $endif$
</li>
