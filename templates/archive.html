<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$title$</title>
    $for(css)$
    <link rel="stylesheet" href="$css$" />
    $endfor$
    <style>
      $highlighting-css$
    </style>
    <noscript>
      <style>
        .katex-html {
          display: none !important;
        }
        .katex-mathml {
          all: unset !important;
        }
      </style>
    </noscript>
  </head>
  <body>
    $body$
    <script src="static/katex.js"></script>
    <script src="static/auto-render.js"></script>
    <script>
      renderMathInElement(document.body);
    </script>
  </body>
</html>
