{{ define "login" }}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <pre></pre>
    <button type="button" style="display: none; padding: 1em">Login</button>
    <script>
      const { publicKey, sessionID, redirectURL } = {{ . }}

      const base64url = (b) => btoa(Array.from(new Uint8Array(b), c => String.fromCodePoint(c)).join('')).replace(/\+/g, '-').replace(/\//g, '_')
      const marshal = (c) => {
        if (typeof c.toJSON === 'function') {
          return JSON.stringify(c)
        }
        return JSON.stringify({
          id: c.id,
          type: c.type,
          authenticatorAttachment: c.authenticatorAttachment,
          rawId: base64url(c.rawId),
          response: {
            authenticatorData: base64url(c.response.authenticatorData),
            clientDataJSON: base64url(c.response.clientDataJSON),
            signature: base64url(c.response.signature),
            userHandle: base64url(c.response.userHandle),
          }
        })
      }

      const login = () =>
        navigator.credentials.get({ publicKey })
          .then(c =>
            fetch('/auth/login', {
              method: "POST",
              headers: {
                'Content-Type': 'application/json',
                'X-Session-Id': sessionID,
              },
              body: marshal(c),
            })
          )
          .then((res) => {
            if (res.ok) {
              window.location.href = redirectURL.startsWith('/auth/login') ? '/' : redirectURL
            } else {
              return res.text()
            }
          })

      window.addEventListener('load', () => {
        login().catch(() => {
          const button = document.querySelector('button')
          button.addEventListener('click', () =>
            login()
              .then(res => { if (res) throw new Error(res) })
              .catch(err => {
                document.querySelector('pre').textContent = err
              })
            )
          button.style.display = 'initial'
        })
      })
    </script>
  </body>
</html>
{{ end }}
